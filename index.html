<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AI GPS Guide</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #out {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .block {
      margin-bottom: 15px;
    }

    .title {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .small {
      color: gray;
      font-size: 14px;
    }
  </style>
</head>
<body>

<h2>🧭 AI GPS Guide</h2>

<button onclick="ask()">Что рядом?</button>

<div id="out">
Нажми кнопку, чтобы определить местоположение
</div>

<script>
async function ask() {

  const out = document.getElementById("out");

  out.innerText = "📡 Получаем GPS...";

  navigator.geolocation.getCurrentPosition(async (pos) => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    out.innerText = "🗺 Определяем место...";

    try {

      const res = await fetch("/api/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ lat, lng })
      });

      const data = await res.json();

      if (!data.ok) {
        out.innerText =
          "❌ Ошибка:\n\n" +
          data.error;
        return;
      }

      out.innerHTML = `
        <div class="block">
          <div class="title">📍 Вы находитесь:</div>
          <div>${data.place || "Неизвестное место"}</div>
        </div>

        <div class="block">
          <div class="title">🏙 Район / адрес:</div>
          <div class="small">
            ${JSON.stringify(data.address, null, 2)}
          </div>
        </div>

        <div class="block">
          <div class="title">🌍 Координаты:</div>
          <div class="small">
            ${lat}, ${lng}
          </div>
        </div>
      `;

    } catch (e) {

      out.innerText =
        "❌ Ошибка запроса:\n\n" +
        e.message;

    }

  }, (err) => {

    out.innerText =
      "❌ GPS ошибка:\n\n" +
      err.message;

  });
}
</script>

</body>
</html>
