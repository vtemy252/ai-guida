<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AI GPS Guide</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    button { padding: 10px 20px; cursor: pointer; }
    #out { margin-top: 20px; white-space: pre-wrap; }
  </style>
</head>
<body>

<h2>AI GPS (Free OpenRouter)</h2>

<button onclick="ask()">Что рядом?</button>

<div id="out"></div>

<script>
async function ask() {
  const out = document.getElementById("out");

  out.innerText = "Берём GPS...";

  navigator.geolocation.getCurrentPosition(async (pos) => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    out.innerText = "Спрашиваю AI...";

    try {
      const res = await fetch("/api/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ lat, lng })
      });

      const data = await res.json();

      out.innerText = data.text || "Нет ответа";

    } catch (e) {
      out.innerText = "Ошибка: " + e.message;
    }

  }, (err) => {
    out.innerText = "GPS ошибка: " + err.message;
  });
}
</script>

</body>
</html>
