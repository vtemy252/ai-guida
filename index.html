<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI GPS PRO</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      padding: 20px;
      margin: 0;
    }

    h2 {
      margin-bottom: 20px;
    }

    button {
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      background: black;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #out {
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .meta {
      color: gray;
      font-size: 14px;
      margin-top: 4px;
      line-height: 1.5;
    }

    .desc {
      margin-top: 10px;
      line-height: 1.5;
    }

  </style>
</head>
<body>

<h2>🧭 AI GPS PRO</h2>

<button onclick="ask()">Что рядом?</button>

<div id="out"></div>

<script>

async function ask() {

  const out = document.getElementById("out");

  out.innerHTML = `
    <div class="card">
      📡 Получаем GPS...
    </div>
  `;

  navigator.geolocation.getCurrentPosition(async (pos) => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    out.innerHTML = `
      <div class="card">
        🗺 Ищем реальные места рядом...
      </div>
    `;

    try {

      const res = await fetch("/api/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          lat,
          lng
        })
      });

      const data = await res.json();

      if (!data.ok) {

        out.innerHTML = `
          <div class="card">
            ❌ Ошибка
            <div class="meta">
              ${data.error || "unknown error"}
            </div>
          </div>
        `;

        return;
      }

      if (!data.places || !data.places.length) {

        out.innerHTML = `
          <div class="card">
            😕 Ничего рядом не найдено
          </div>
        `;

        return;
      }

      out.innerHTML = `
        <div class="card">
          📍 Найдено мест: ${data.places.length}
        </div>

        ${data.places.map(place => `

          <div class="card">

            <div class="title">
              📍 ${place.name}
            </div>

            <div class="meta">
              🏷 ${place.type}
            </div>

            <div class="meta">
              📏 ${place.distance} м
            </div>

            <div class="desc">
              📝 ${place.description || "Интересное место рядом"}
            </div>

          </div>

        `).join("")}
      `;

    } catch (e) {

      out.innerHTML = `
        <div class="card">
          ❌ Ошибка запроса

          <div class="meta">
            ${e.message}
          </div>
        </div>
      `;

    }

  }, (err) => {

    out.innerHTML = `
      <div class="card">
        ❌ GPS ошибка

        <div class="meta">
          ${err.message}
        </div>
      </div>
    `;

  });

}

</script>

</body>
</html>
