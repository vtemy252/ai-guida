<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AI GPS Guide</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #out {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .place {
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }

    .type {
      color: gray;
      font-size: 14px;
    }
  </style>
</head>
<body>

<h2>🧭 AI GPS Guide</h2>

<button onclick="ask()">Что рядом?</button>

<div id="out">
Нажми кнопку, чтобы найти реальные места рядом
</div>

<script>
async function ask() {
  const out = document.getElementById("out");

  out.innerText = "📡 Получаем GPS...";

  navigator.geolocation.getCurrentPosition(async (pos) => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    out.innerText = "🗺 Ищем реальные места рядом...";

    try {

      const res = await fetch("/api/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ lat, lng })
      });

      const data = await res.json();

      if (!data.ok) {
        out.innerText = "❌ Ошибка:\n" + data.error;
        return;
      }

      if (!data.places.length) {
        out.innerText = "😕 Ничего интересного рядом не найдено";
        return;
      }

      out.innerHTML =
        "<h3>📍 Реальные места рядом:</h3>" +
        data.places.map(place => `
          <div class="place">
            <b>${place.name}</b><br>
            <span class="type">${place.type || "место"}</span>
          </div>
        `).join("");

    } catch (e) {

      out.innerText = "❌ Ошибка запроса:\n" + e.message;

    }

  }, (err) => {

    out.innerText = "❌ GPS ошибка:\n" + err.message;

  });
}
</script>

</body>
</html>
