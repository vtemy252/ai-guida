<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AI GPS PRO</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      padding: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    button {
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      background: black;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #out {
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .meta {
      color: gray;
      font-size: 14px;
    }

  </style>
</head>
<body>

<h2>🧭 AI GPS PRO</h2>

<button onclick="ask()">Что рядом?</button>

<div id="out"></div>

<script>

async function ask() {

  const out = document.getElementById("out");

  out.innerHTML = "📡 Получаем GPS...";

  navigator.geolocation.getCurrentPosition(async (pos) => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    out.innerHTML = "🗺 Ищем реальные места рядом...";

    try {

      const res = await fetch("/api/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          lat,
          lng
        })
      });

      const data = await res.json();

      if (!data.ok) {
        out.innerHTML =
          "<div class='card'>❌ Ошибка:<br><br>" +
          data.error +
          "</div>";
        return;
      }

      if (!data.places.length) {
        out.innerHTML =
          "<div class='card'>😕 Ничего рядом не найдено</div>";
        return;
      }

      out.innerHTML =
        data.places.map(place => `
          <div class="card">

            <div class="title">
              📍 ${place.name}
            </div>

            <div class="meta">
              ${place.type}
            </div>

            <div class="meta">
              📏 ${place.distance} м
            </div>

          </div>
        `).join("");

    } catch (e) {

      out.innerHTML =
        "<div class='card'>❌ Ошибка запроса:<br><br>" +
        e.message +
        "</div>";

    }

  }, (err) => {

    out.innerHTML =
      "<div class='card'>❌ GPS ошибка:<br><br>" +
      err.message +
      "</div>";

  });

}

</script>

</body>
</html>
