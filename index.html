<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AI GPS Free</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    button { padding: 10px 20px; cursor: pointer; }
    #out { margin-top: 20px; white-space: pre-wrap; }
  </style>
</head>
<body>

<h2>AI GPS (OpenRouter FREE)</h2>

<button onclick="ask()">Что рядом?</button>

<div id="out"></div>

<script>
async function ask() {
  const out = document.getElementById("out");

  out.innerText = "Берём GPS...";

  navigator.geolocation.getCurrentPosition(async (pos) => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    out.innerText = "Спрашиваю AI...";

    try {
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer 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",
          "HTTP-Referer": window.location.href,
          "X-Title": "AI GPS Guide"
        },
        body: JSON.stringify({
          model: "meta-llama/llama-3.1-8b-instruct:free",
          messages: [
            {
              role: "system",
              content: "Ты туристический гид. Отвечай кратко и по делу."
            },
            {
              role: "user",
              content: `Я нахожусь здесь: ${lat}, ${lng}. Что интересного рядом?`
            }
          ]
        })
      });

      const data = await res.json();

      if (data.error) {
        out.innerText = "Ошибка: " + data.error.message;
        return;
      }

      out.innerText = data.choices[0].message.content;

    } catch (e) {
      out.innerText = "Ошибка запроса: " + e.message;
    }

  }, (err) => {
    out.innerText = "GPS ошибка: " + err.message;
  });
}
</script>

</body>
</html>
